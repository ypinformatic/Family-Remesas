<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Remesas desde Chile</title>

<style>
:root{
 --bg:#0b1220;
 --card:#111a2e;
 --txt:#e9eefc;
 --muted:#a7b4d6;
 --accent:#22c55e;
 --blue:#1f4fd8;
}

body{
 margin:0;
 font-family:system-ui,Segoe UI,Roboto;
 background:linear-gradient(180deg,#070b14,var(--bg));
 color:var(--txt);
 padding:25px;
}

.wrap{max-width:900px;margin:auto}
h1{margin:0 0 15px 0;font-size:22px}

.card{
 background:rgba(17,26,46,.9);
 border:1px solid rgba(255,255,255,.08);
 border-radius:16px;
 padding:18px;
 margin-bottom:15px;
}

input{
 width:100%;
 background:#0a1020;
 color:white;
 border:1px solid rgba(255,255,255,.15);
 border-radius:10px;
 padding:10px;
 margin-top:6px;
}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:15px;
}

th,td{
 padding:12px;
 border-bottom:1px solid rgba(255,255,255,.08);
 text-align:left;
}

th{color:var(--muted);font-size:13px}
.rate{font-weight:800;font-size:16px}
.highlight{color:var(--accent)}
.result{
 font-size:18px;
 font-weight:900;
 margin-top:10px;
 color:var(--accent);
}
</style>
</head>

<body>
<div class="wrap">

<h1>🌎 Envíos desde Chile</h1>

<div class="card">
<label>Monto a enviar (CLP)</label>
<input type="number" id="amount" value="20000"/>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>País</th>
<th>Tasa</th>
<th>Recibe</th>
</tr>
</thead>
<tbody id="rates"></tbody>
</table>
</div>

</div>

<script>

const API = "http://localhost:5177/api/quotes?fiats=CLP,VES,COP,USD,PEN";
const BENEFIT = 0.15;
const FEE_BUY = 0.07;
const FEE_SELL = 0.06;

const FIATS = {
 VES:"🇻🇪 Venezuela",
 COP:"🇨🇴 Colombia",
 USD:"🇪🇨 Ecuador",
 PEN:"🇵🇪 Perú"
};

function format(n,d=2){
 if(!n) return "—";
 return n.toLocaleString("es-CL",{maximumFractionDigits:d});
}

async function loadRates(){

 const res = await fetch(API);
 const data = await res.json();

 const clpBuy = data.quotes?.CLP?.buy?.weighted;
 if(!clpBuy) return;

 const tbody = document.getElementById("rates");
 tbody.innerHTML = "";

 const amount = Number(document.getElementById("amount").value||0);

 for(const code in FIATS){

   const sell = data.quotes?.[code]?.sell?.weighted;
   if(!sell) continue;

   // ===== CÁLCULO REAL =====

   // compra USDT
   const usdt = (1 / clpBuy) * (1 - FEE_BUY);

   // venta destino
   const dest = usdt * sell * (1 - FEE_SELL);

   // aplicar margen
   const finalRate = dest * (1 - BENEFIT);

   // cuánto recibe por monto ingresado
   const receive = amount * finalRate;

   tbody.innerHTML += `
   <tr>
     <td>${FIATS[code]}</td>
     <td class="rate">${format(finalRate,6)} ${code}</td>
     <td class="highlight">${format(receive)} ${code}</td>
   </tr>
   `;
 }

}

document.getElementById("amount").addEventListener("input", loadRates);

loadRates();
setInterval(loadRates, 10000);

</script>
</body>
</html>
